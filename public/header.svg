<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 660 130">
  <defs>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#3a0ca3"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#7209b7"/>
    </linearGradient>
    <filter id="s2">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#3a0ca3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Карточка 1 (сзади) -->
  <g filter="url(#s2)">
    <rect x="15" y="25" width="88" height="58" rx="8" fill="url(#card2)" opacity="0.7"
      transform="rotate(-8, 59, 54)"/>
  </g>

  <!-- Карточка 2 (спереди) -->
  <g filter="url(#s2)">
    <rect x="22" y="30" width="88" height="58" rx="8" fill="url(#card1)"
      transform="rotate(4, 66, 59)"/>
    <!-- Полоса на карточке -->
    <rect x="22" y="52" width="88" height="12" fill="#ffffff" opacity="0.2"
      transform="rotate(4, 66, 59)"/>
    <!-- Чип -->
    <rect x="34" y="38" width="18" height="14" rx="3" fill="#ffd60a" opacity="0.9"
      transform="rotate(4, 66, 59)"/>
  </g>

  <!-- Текст -->
  <text x="135" y="72"
    font-family="'Arial Black', sans-serif"
    font-size="50" font-weight="900" fill="url(#card1)"
    letter-spacing="1">SRAVNI</text>

  <text x="350" y="72"
    font-family="'Arial Black', sans-serif"
    font-size="50" font-weight="900" fill="url(#card2)"
    letter-spacing="2">PAY.RU</text>

  <!-- Нижняя линия с градиентом -->
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#f72585"/>
    </linearGradient>
  </defs>
  <rect x="135" y="82" width="415" height="3" rx="2" fill="url(#lineGrad)"/>

  <!-- Подпись -->
  <text x="135" y="108"
    font-family="Arial" font-size="12"
    fill="#4361ee" letter-spacing="4" opacity="0.7">СРАВНИ КАРТЫ И КРЕДИТЫ</text>
</svg>
